<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CleanPro TX — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#0F1A2E;--teal:#3ECFAA;--teal2:#2BB894;--white:#fff;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--navy);min-height:100vh;display:flex;flex-direction:column;}
nav{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.07);}
.logo{display:flex;align-items:center;gap:8px;}
.logo-sq{width:30px;height:30px;border-radius:7px;background:var(--teal);display:flex;align-items:center;justify-content:center;}
.logo-sq svg{width:16px;height:16px;fill:#fff;}
.brand{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:#fff;}
.nav-right{font-size:13px;color:rgba(255,255,255,0.5);}
.nav-right a{color:var(--teal);text-decoration:none;font-weight:600;}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
.wrap{width:100%;max-width:420px;}
.hdr{text-align:center;margin-bottom:28px;}
.badge{display:inline-flex;background:rgba(62,207,170,0.12);border:1px solid rgba(62,207,170,0.25);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--teal);margin-bottom:14px;}
h1{font-family:'Sora',sans-serif;font-size:28px;font-weight:800;color:#fff;margin-bottom:6px;}
.sub{font-size:14px;color:rgba(255,255,255,0.4);}
.box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:28px;}
.grp{margin-bottom:16px;}
label{display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;}
input{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:9px;font-size:14px;color:#fff;outline:none;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
input:focus{border-color:var(--teal);}
input::placeholder{color:rgba(255,255,255,0.2);}
.forgot{font-size:12px;color:var(--teal);cursor:pointer;display:block;text-align:right;margin-top:4px;}
.btn{width:100%;padding:13px;background:var(--teal);border:none;border-radius:10px;font-size:15px;font-weight:700;color:#0F1A2E;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;transition:background 0.2s;}
.btn:hover{background:var(--teal2);}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.err{background:rgba(226,75,74,0.12);border:1px solid rgba(226,75,74,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:14px;display:none;}
.divider{text-align:center;font-size:12px;color:rgba(255,255,255,0.25);margin:18px 0;position:relative;}
.divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,0.08);}
.divider span{background:rgba(255,255,255,0.04);padding:0 12px;position:relative;}
.signup-link{text-align:center;font-size:13px;color:rgba(255,255,255,0.4);margin-top:16px;}
.signup-link a{color:var(--teal);text-decoration:none;font-weight:600;}
footer{padding:20px 24px;text-align:center;font-size:12px;color:rgba(255,255,255,0.2);border-top:1px solid rgba(255,255,255,0.06);}
</style>
</head>
<body>
<nav>
  <div class="logo">
    <div class="logo-sq"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
    <span class="brand">CleanPro TX</span>
  </div>
  <div class="nav-right">No account? <a href="/register.html">Start free trial</a></div>
</nav>

<main>
  <div class="wrap">
    <div class="hdr">
      <div class="badge">Professional Dashboard</div>
      <h1>Welcome back</h1>
      <p class="sub">Sign in to your CleanPro TX dashboard</p>
    </div>
    <div class="box">
      <div class="err" id="err"></div>
      <div class="grp">
        <label>Email address</label>
        <input id="email" type="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <div class="grp">
        <label>Password</label>
        <input id="pass" type="password" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()"/>
        <span class="forgot" onclick="forgotPass()">Forgot password?</span>
      </div>
      <button class="btn" id="btn" onclick="doLogin()">Sign in to dashboard</button>
      <div class="divider"><span>or</span></div>
      <div class="signup-link">New to CleanPro TX? <a href="/register.html">Start your 14-day free trial</a></div>
    </div>
  </div>
</main>

<footer>© 2026 CleanPro TX — Built in Texas 🤠</footer>

<script>
const sb = supabase.createClient(
  'https://yfqoncqoerleoaqxvaie.supabase.co',
  'sb_publishable_cbrrFqLqJMkUXJ4icNOn9g_lEv4NneF'
);

// If already logged in, redirect to dashboard
sb.auth.getSession().then(function(res){
  if(res.data.session) window.location.href = '/dashboard.html';
});

function showErr(msg){
  var el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = 'block';
}

async function doLogin(){
  document.getElementById('err').style.display = 'none';
  var email = document.getElementById('email').value.trim();
  var pass = document.getElementById('pass').value;
  if(!email || !pass){ showErr('Please enter your email and password.'); return; }
  var btn = document.getElementById('btn');
  btn.textContent = 'Signing in...'; btn.disabled = true;
  var res = await sb.auth.signInWithPassword({email:email, password:pass});
  if(res.error){
    showErr(res.error.message);
    btn.textContent = 'Sign in to dashboard'; btn.disabled = false;
    return;
  }
  window.location.href = '/dashboard.html';
}

async function forgotPass(){
  var email = document.getElementById('email').value.trim();
  if(!email){ showErr('Enter your email first.'); return; }
  await sb.auth.resetPasswordForEmail(email, {redirectTo: window.location.origin+'/reset-password.html'});
  document.getElementById('err').style.color = '#3ECFAA';
  document.getElementById('err').style.display = 'block';
  document.getElementById('err').textContent = 'Password reset email sent! Check your inbox.';
}
</script>
</body>
</html>
